name: smart_overlay
description: "A premium, lightweight smart loading overlay manager for Flutter. Features glassmorphism, gradients, and unique wavy (scalloped) progress indicators."
version: 0.1.1
homepage: https://github.com/ZunairaMughal24/flutter-smart-overlay
repository: https://github.com/ZunairaMughal24/flutter-smart-overlay

topics:
  - overlay
  - loader
  - animation
  - ui-component
  - progress-indicator

screenshots:
  - description: 'Full-screen loading overlay and compact toast notification in action.'
    path: 'assets/gif1.gif'
  - description: 'All 10 indicator styles — FluxWave, Lumina, Hydra, Aura, Nova, Orbit, Eclipse, Nexus, Zenith, and Vortex.'
    path: 'assets/gif2.gif'
  - description: 'Live animation control — start, stop, and adjust speed on demand.'
    path: 'assets/gif3.gif'
  - description: 'Customization playground — colors, gradients, and shape parameters for every indicator.'
    path: 'assets/gif4.gif'

environment:
  sdk: ^3.8.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

